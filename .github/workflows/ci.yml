name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typescript:
    name: TypeScript (lint, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: finance-tracker

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: finance-tracker/package-lock.json

      # Install from the committed lockfile only. Do not run `npm install --package-lock-only` in CI:
      # different npm versions rewrite lockfile v3 metadata (`peer`, optional entries), causing false
      # "out of sync" failures even when `npm ci` would succeed. Real drift still fails `npm ci`.
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Production build
        run: npm run build

  rust:
    name: Rust (check)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable

      - name: Cargo check
        working-directory: finance-tracker/src-tauri
        run: cargo check --all-targets
