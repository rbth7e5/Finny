name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typescript:
    name: TypeScript (lint, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: finance-tracker

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: finance-tracker/package-lock.json

      # Fail fast if package.json was committed without an updated lockfile (npm ci requires them in sync).
      - name: Verify package-lock.json matches package.json
        run: |
          npm install --package-lock-only
          git diff --exit-code package-lock.json || (
            echo "::error::package-lock.json is out of sync with package.json. Run \`npm install\` in finance-tracker/ and commit the updated lockfile."
            exit 1
          )

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Production build
        run: npm run build

  rust:
    name: Rust (check)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable

      - name: Cargo check
        working-directory: finance-tracker/src-tauri
        run: cargo check --all-targets
